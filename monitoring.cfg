# Monitoring stack memory limits
# Flip ENABLED to false to remove all limits (e.g. if you upgrade instance type)
MEMORY_LIMITS_ENABLED=true

# Container memory caps — Docker accepts: 128m, 256m, 300m, 500m, 1g etc.
# t3.micro has ~914MB total. Budget breakdown:
#   OS + kernel  ~150MB
#   fastapi      ~150MB
#   prometheus   ~180MB
#   node-exporter ~50MB
#   grafana      ~300MB
#   headroom      ~84MB
GRAFANA_MEMORY=380m
PROMETHEUS_MEMORY=180m
NODE_EXPORTER_MEMORY=50m
